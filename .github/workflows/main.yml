name: Lint && Test

on:
  push:
    branches:
      - "**"
    tags:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run linters
        run: make lint
      - name: Run Tests
        run: make test
